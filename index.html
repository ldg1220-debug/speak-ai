<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Tutor AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a; --sur: #1e293b; --sur2: #334155; --bdr: #334155;
      --txt: #f1f5f9; --mut: #94a3b8;
      --ind: #6366f1; --ind-h: #818cf8; --red: #ef4444;
      --amb-bg: rgba(245,158,11,.12); --amb-bdr: rgba(245,158,11,.3); --amb-txt: #fcd34d;
    }
    html, body { height: 100%; background: var(--bg); color: var(--txt);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--sur2); border-radius: 2px; }
    #app { display: flex; flex-direction: column; height: 100%; max-width: 680px; margin: 0 auto; }

    /* ── Key banner ── */
    #key-banner { display: flex; align-items: center; gap: 8px; padding: 8px 14px;
      background: var(--sur); border-bottom: 1px solid var(--bdr); flex-shrink: 0; }
    #key-banner label { font-size: 11px; color: var(--mut); white-space: nowrap; }
    #key-input { flex: 1; background: var(--bg); border: 1px solid var(--bdr); border-radius: 6px;
      padding: 4px 9px; color: var(--txt); font-size: 11px; outline: none; font-family: monospace; }
    #key-input:focus { border-color: var(--ind); }
    #key-save { padding: 4px 11px; background: var(--ind); color: #fff; border: none;
      border-radius: 6px; font-size: 11px; cursor: pointer; }
    #key-save:hover { background: var(--ind-h); }

    /* ── Header ── */
    header { display: flex; align-items: center; gap: 8px; padding: 10px 14px;
      border-bottom: 1px solid var(--bdr); flex-shrink: 0; }
    .h-icon { width: 30px; height: 30px; border-radius: 9px; background: var(--ind);
      display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    header h1 { font-size: 13px; font-weight: 600; flex: 1; }
    #persona-subtitle { font-size: 10px; color: var(--mut); }
    .hdr-btn { background: none; border: none; cursor: pointer; color: var(--mut);
      padding: 5px; border-radius: 7px; transition: background .15s, color .15s;
      display: flex; align-items: center; gap: 4px; font-size: 11px; }
    .hdr-btn:hover { background: var(--sur); color: var(--txt); }
    .hdr-btn:disabled { opacity: .35; cursor: not-allowed; }
    .hdr-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    #report-btn { color: #f87171; }
    #report-btn:hover { background: rgba(239,68,68,.12); }
    #badge-count { display: inline-flex; align-items: center; justify-content: center;
      width: 14px; height: 14px; border-radius: 50%; background: var(--ind);
      font-size: 8px; color: #fff; font-weight: 700; }

    /* ── Persona selector (4-col grid) ── */
    #persona-strip { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px;
      padding: 8px 12px; border-bottom: 1px solid var(--bdr); flex-shrink: 0; }
    .p-btn { display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 8px 4px; border-radius: 12px; border: none; cursor: pointer;
      background: var(--sur); color: var(--mut); transition: all .18s; }
    .p-btn:hover { background: var(--sur2); color: var(--txt); }
    .p-btn.active { background: var(--ind); color: #fff; transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(99,102,241,.35); }
    .p-btn .pe { font-size: 22px; line-height: 1; }
    .p-btn .pn { font-size: 11px; font-weight: 600; line-height: 1.2; }
    .p-btn .pr { font-size: 9px; opacity: .6; }

    /* ── Topic selector ── */
    #topic-strip { display: flex; gap: 6px; padding: 7px 12px; overflow-x: auto;
      border-bottom: 1px solid var(--bdr); flex-shrink: 0; scrollbar-width: none; }
    .t-btn { flex-shrink: 0; padding: 4px 10px; border-radius: 99px; border: none; cursor: pointer;
      font-size: 11px; font-weight: 500; background: var(--sur); color: var(--mut); transition: all .15s; }
    .t-btn:hover { background: var(--sur2); color: var(--txt); }
    .t-btn.active { background: var(--ind); color: #fff; }

    /* ── CSS Avatar ── */
    #avatar-wrap { flex-shrink: 0; height: 200px; display: flex; align-items: center;
      justify-content: center; position: relative; overflow: hidden; }
    #avatar-bg { position: absolute; inset: 0; transition: background .5s; }
    .avatar { width: 110px; height: 110px; border-radius: 50%; position: relative;
      display: flex; align-items: center; justify-content: center;
      transition: background .5s, box-shadow .5s; z-index: 1; }
    /* Idle float */
    @keyframes av-float { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-8px) rotate(1deg)} }
    @keyframes av-float-slow { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    @keyframes av-float-bounce { 0%,100%{transform:translateY(0) scale(1)} 40%{transform:translateY(-12px) scale(1.03)} 60%{transform:translateY(-10px) scale(1.03)} }
    @keyframes av-nod { 0%,100%{transform:rotate(0deg)} 25%{transform:rotate(-4deg)} 75%{transform:rotate(4deg)} }
    @keyframes av-tilt { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(12deg)} }
    /* Eyes */
    .eyes { position: absolute; top: 30px; width: 100%; display: flex; justify-content: center; gap: 20px; }
    .eye  { width: 16px; height: 16px; border-radius: 50%; background: #1a1a2e; position: relative;
      transition: transform .1s; }
    .eye::after { content: ''; position: absolute; top: 2px; right: 2px; width: 5px; height: 5px;
      border-radius: 50%; background: rgba(255,255,255,.9); }
    @keyframes blink { 0%,90%,100%{transform:scaleY(1)} 95%{transform:scaleY(.08)} }
    .eye { animation: blink var(--blink-t, 4s) ease-in-out infinite; }
    .eye:nth-child(2) { animation-delay: .05s; }
    /* Mouth */
    .mouth-wrap { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      width: 36px; overflow: hidden; display: flex; justify-content: center; }
    .mouth { width: 32px; height: 8px; border-radius: 0 0 16px 16px;
      background: #1a1a2e; transition: height .06s; }
    /* Eyebrows */
    .brows { position: absolute; top: 20px; width: 100%; display: flex; justify-content: center; gap: 22px; }
    .brow { width: 18px; height: 4px; border-radius: 2px; background: #1a1a2e; transition: transform .2s, translateY .2s; }
    .brow.l { transform: rotate(10deg); }
    .brow.r { transform: rotate(-10deg); }
    /* Accessory */
    .acc { position: absolute; }
    /* State badge */
    #state-badge { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      font-size: 10px; padding: 2px 10px; border-radius: 99px; font-weight: 600;
      letter-spacing: .04em; text-transform: uppercase; pointer-events: none;
      transition: background .3s, color .3s; background: rgba(51,65,85,.6); color: var(--mut); }

    /* ── Chat ── */
    #chat { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
    .mw { display: flex; flex-direction: column; }
    .mw.user { align-items: flex-end; }
    .mw.ai   { align-items: flex-start; }
    .bub { max-width: 82%; padding: 9px 13px; border-radius: 16px; font-size: 13.5px; line-height: 1.55; }
    .user .bub  { background: var(--ind); color: #fff; border-bottom-right-radius: 4px; }
    .ai   .bub  { background: var(--sur); color: var(--txt); border-top-left-radius: 4px; }
    .ai-row { display: flex; align-items: flex-start; gap: 8px; }
    .ai-av  { width: 24px; height: 24px; border-radius: 50%; background: var(--sur2); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; margin-top: 2px; font-size: 13px; }
    .correction { margin-top: 5px; max-width: 82%; padding: 7px 11px; border-radius: 10px;
      background: var(--amb-bg); border: 1px solid var(--amb-bdr); font-size: 11.5px;
      line-height: 1.5; color: var(--amb-txt); }
    .pron-badge { margin-top: 4px; display: inline-block; font-size: 10px; padding: 2px 9px;
      border-radius: 99px; border: 1px solid; font-weight: 500; }
    .pron-ex  { color: #4ade80; background: rgba(74,222,128,.1); border-color: rgba(74,222,128,.3); }
    .pron-gd  { color: #fbbf24; background: rgba(251,191,36,.1); border-color: rgba(251,191,36,.3); }
    .pron-ok  { color: #fb923c; background: rgba(251,146,60,.1); border-color: rgba(251,146,60,.3); }
    .pron-nw  { color: #f87171; background: rgba(248,113,113,.1); border-color: rgba(248,113,113,.3); }
    /* Typing dots */
    .dots { display: flex; gap: 4px; padding: 11px 13px; background: var(--sur);
      border-radius: 16px; border-top-left-radius: 4px; align-items: center; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--mut);
      animation: bounce 1.2s ease-in-out infinite; }
    .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

    /* ── Footer ── */
    footer { padding: 12px 14px; border-top: 1px solid var(--bdr); flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center; gap: 6px; }
    #status-txt { font-size: 11px; color: var(--mut); }
    #mic-btn { width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; position: relative;
      background: var(--ind); box-shadow: 0 4px 18px rgba(99,102,241,.4);
      transition: transform .15s, background .15s, box-shadow .15s;
      user-select: none; -webkit-user-select: none; }
    #mic-btn svg { width: 24px; height: 24px; stroke: #fff; fill: none; stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round; pointer-events: none; }
    #mic-btn:disabled { background: var(--sur2); box-shadow: none; opacity: .4; cursor: not-allowed; }
    #mic-btn.rec { background: var(--red); transform: scale(1.1); box-shadow: 0 4px 22px rgba(239,68,68,.5); }
    #mic-btn.rec::before { content:''; position:absolute; inset:-10px; border-radius:50%;
      border: 2px solid var(--red); animation: pring 1.2s ease-out infinite; }
    @keyframes pring{0%{transform:scale(1);opacity:.9}100%{transform:scale(1.65);opacity:0}}
    #mic-btn:not(.rec):not(:disabled):active{transform:scale(.94)}
    .spin{animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}

    /* ── Session Report Modal ── */
    .overlay { position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.7);
      backdrop-filter: blur(4px); display: flex; align-items: flex-end; justify-content: center;
      padding: 0 12px 16px; }
    .modal { width: 100%; max-width: 520px; background: #0f172a; border: 1px solid var(--sur2);
      border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; max-height: 88vh; }
    .modal-hdr { display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; border-bottom: 1px solid var(--bdr); flex-shrink: 0; }
    .modal-hdr h2 { font-size: 14px; font-weight: 600; }
    .modal-close { background: none; border: none; cursor: pointer; color: var(--mut);
      padding: 4px; border-radius: 7px; line-height: 0; }
    .modal-close:hover { background: var(--sur); color: var(--txt); }
    .modal-body { overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .score-row { display: flex; align-items: center; justify-content: space-around;
      background: rgba(30,41,59,.6); border-radius: 14px; padding: 14px; }
    .score-divider { width: 1px; height: 50px; background: var(--bdr); }
    .score-num { font-size: 26px; font-weight: 700; }
    .score-lbl { font-size: 10px; color: var(--mut); margin-top: 2px; }
    .rep-section h3 { font-size: 10px; font-weight: 600; color: var(--mut); text-transform: uppercase;
      letter-spacing: .06em; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
    .rep-feedback { background: rgba(99,102,241,.12); border: 1px solid rgba(99,102,241,.25);
      border-radius: 12px; padding: 12px; font-size: 13px; color: #c7d2fe; line-height: 1.6; }
    .corr-item { background: var(--sur); border-radius: 10px; padding: 10px 12px; margin-bottom: 7px; }
    .corr-orig { font-size: 11px; color: #f87171; text-decoration: line-through; opacity: .7; margin-bottom: 2px; }
    .corr-fix  { font-size: 13px; color: #4ade80; font-weight: 500; }
    .corr-why  { font-size: 11px; color: var(--mut); margin-top: 3px; }
    .tag { display: inline-block; padding: 3px 10px; border-radius: 99px;
      background: rgba(139,92,246,.18); border: 1px solid rgba(139,92,246,.3);
      color: #c4b5fd; font-size: 11px; margin: 2px; }
    .str-item, .rec-item { font-size: 13px; color: var(--txt); padding: 3px 0;
      display: flex; align-items: flex-start; gap: 6px; }
    .str-item::before { content:'✓'; color: #4ade80; flex-shrink: 0; }
    .rec-item::before { content:'→'; color: #38bdf8; flex-shrink: 0; }
    .modal-foot { padding: 12px 16px; border-top: 1px solid var(--bdr); display: flex; gap: 8px; flex-shrink: 0; }
    .btn-sec { flex: 1; padding: 10px; border-radius: 12px; border: none; cursor: pointer;
      background: var(--sur); color: var(--mut); font-size: 13px; font-weight: 500; }
    .btn-sec:hover { background: var(--sur2); }
    .btn-pri { flex: 1; padding: 10px; border-radius: 12px; border: none; cursor: pointer;
      background: var(--ind); color: #fff; font-size: 13px; font-weight: 500; }
    .btn-pri:hover { background: var(--ind-h); }

    /* ── History Drawer ── */
    .drawer-overlay { position: fixed; inset: 0; z-index: 50; display: flex; justify-content: flex-end; }
    .drawer-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(3px); }
    .drawer { position: relative; width: min(360px,92vw); height: 100%; background: #0f172a;
      border-left: 1px solid var(--bdr); display: flex; flex-direction: column; }
    .drawer-hdr { display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid var(--bdr); flex-shrink: 0; }
    .drawer-hdr h2 { font-size: 13px; font-weight: 600; }
    .drawer-body { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .hist-item { background: var(--sur); border-radius: 12px; overflow: hidden; }
    .hist-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; }
    .hist-row:hover { background: rgba(255,255,255,.04); }
    .hist-meta { flex: 1; min-width: 0; }
    .hist-title { font-size: 12px; font-weight: 600; color: var(--txt); display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .hist-sub { font-size: 10px; color: var(--mut); margin-top: 2px; }
    .hist-detail { border-top: 1px solid var(--bdr); padding: 10px 14px; display: none; }
    .hist-detail.open { display: block; }
    .hist-msgs { max-height: 120px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; margin-bottom: 8px; }
    .hm-user { font-size: 11px; background: rgba(99,102,241,.2); padding: 4px 9px; border-radius: 8px;
      color: #c7d2fe; text-align: right; margin-left: 20px; }
    .hm-ai   { font-size: 11px; background: var(--sur2); padding: 4px 9px; border-radius: 8px;
      color: var(--mut); margin-right: 20px; }
    .hist-fbk { font-size: 11px; color: #c7d2fe; background: rgba(99,102,241,.1); border-radius: 8px;
      padding: 7px 10px; line-height: 1.5; margin-bottom: 6px; }
    .hist-del { background: none; border: none; cursor: pointer; font-size: 11px;
      color: var(--mut); display: flex; align-items: center; gap: 4px; padding: 2px 0; }
    .hist-del:hover { color: #f87171; }
    .score-chip { font-size: 9px; padding: 1px 6px; border-radius: 99px; border: 1px solid; font-weight: 700; }
    .topic-chip { font-size: 9px; padding: 1px 6px; border-radius: 99px;
      background: rgba(99,102,241,.2); border: 1px solid rgba(99,102,241,.3); color: #a5b4fc; }
    .empty-hist { text-align: center; color: var(--mut); font-size: 13px; margin-top: 60px; }
    .empty-hist div { font-size: 32px; margin-bottom: 10px; }
  </style>
</head>
<body>
<div id="app">
  <!-- Key banner -->
  <div id="key-banner">
    <label for="key-input">OpenAI Key</label>
    <input id="key-input" type="password" placeholder="sk-..." autocomplete="off" />
    <button id="key-save">Save</button>
  </div>

  <!-- Header -->
  <header>
    <div class="h-icon">📚</div>
    <div style="flex:1;min-width:0">
      <h1>English Tutor AI</h1>
      <div id="persona-subtitle"></div>
    </div>
    <button class="hdr-btn" id="history-btn" title="대화 기록">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="badge-count" style="display:none"></span>
    </button>
    <button class="hdr-btn" id="report-btn" title="세션 리포트" style="display:none">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      리포트
    </button>
    <button class="hdr-btn" id="reset-btn" title="새 대화">
      <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
    </button>
  </header>

  <!-- Persona selector -->
  <div id="persona-strip"></div>

  <!-- Topic selector -->
  <div id="topic-strip"></div>

  <!-- Avatar -->
  <div id="avatar-wrap">
    <div id="avatar-bg"></div>
    <div class="avatar" id="avatar">
      <div class="brows"><div class="brow l" id="brow-l"></div><div class="brow r" id="brow-r"></div></div>
      <div class="eyes"><div class="eye" id="eye-l"></div><div class="eye" id="eye-r"></div></div>
      <div class="mouth-wrap"><div class="mouth" id="mouth"></div></div>
      <div class="acc" id="accessory"></div>
    </div>
    <div id="state-badge">Idle</div>
  </div>

  <!-- Chat -->
  <div id="chat"></div>

  <!-- Footer -->
  <footer>
    <span id="status-txt">Hold to speak · 한국어도 OK</span>
    <button id="mic-btn">
      <svg id="ic-mic"  viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M19 10a7 7 0 0 1-14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
      <svg id="ic-off"  viewBox="0 0 24 24" style="display:none"><line x1="2" y1="2" x2="22" y2="22"/><path d="M18.89 13.23A7.12 7.12 0 0 0 19 12"/><path d="M5 10a7 7 0 0 0 12.93 3"/><path d="M15 9.34V5a3 3 0 0 0-5.68-1.33"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
      <svg id="ic-spin" viewBox="0 0 24 24" class="spin" style="display:none"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
    </button>
  </footer>
</div>
<audio id="tts-audio" style="display:none"></audio>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════════════════════════
const PERSONAS = {
  sunny: {
    id:'sunny', name:'Sunny', emoji:'🌟', roleKo:'어린이 친구', voice:'fable',
    greeting:"Hi hi hi! I'm Sunny! 🌟 What do you want to talk about today? Animals? 🐶 Games? 🎮 You pick!",
    color:'#FFB300', glow:'rgba(255,179,0,.35)', eyeColor:'#3D1A00', mouthColor:'#CC2200', rosy:'#FF8C8C',
    bgGrad:'radial-gradient(ellipse at 50% 60%, #2D1800 0%, #0a0f1a 100%)',
    blinkT:'2.5s', animClass:'av-float-bounce',
    prompt:`You are Sunny, a super cheerful AI friend helping children learn English! Use VERY simple words. Use emojis often 🎉✨. If Korean spoken, acknowledge in 1 Korean sentence then invite English. Corrections: gentle - "Great try! A better way is:..." null if Korean/perfect. Return ONLY JSON: {"correction":null,"reply":"..."}`
  },
  aria: {
    id:'aria', name:'Aria', emoji:'🌸', roleKo:'여성 튜터', voice:'nova',
    greeting:"Hello! I'm Aria. 🌸 It's lovely to meet you. What's been on your mind lately?",
    color:'#C084FC', glow:'rgba(192,132,252,.35)', eyeColor:'#3B0764', mouthColor:'#7C3AED', rosy:'#F0ABFC',
    bgGrad:'radial-gradient(ellipse at 50% 60%, #1A0030 0%, #0a0f1a 100%)',
    blinkT:'3.8s', animClass:'av-float-slow',
    prompt:`You are Aria, a warm nurturing English tutor. Respond primarily in English. If Korean, acknowledge in 1 Korean sentence then guide to English. Corrections: "That was lovely! You could also say:..." null if Korean/perfect. Return ONLY JSON: {"correction":null,"reply":"..."}`
  },
  kai: {
    id:'kai', name:'Kai', emoji:'😎', roleKo:'남성 튜터', voice:'onyx',
    greeting:"Hey! What's up? I'm Kai 😎 Ready to chat about anything — what's on your mind?",
    color:'#38BDF8', glow:'rgba(56,189,248,.35)', eyeColor:'#0C4A6E', mouthColor:'#0369A1', rosy:null,

function startAvatarLoop() {
  if (avatarRaf) return
  function tick() {
    const amp = Math.min(Math.max(amplitude, 0), 1)
    const st  = charState()
    // Mouth
    const mh = st === 'speaking' ? Math.round(8 + amp * 28) : 8
    mouthEl.style.height = mh + 'px'
    // Eyebrow
    const by = st === 'speaking' ? -3 - amp * 5 : st === 'thinking' ? -7 : st === 'listening' ? 0 : -2
    browLEl.style.marginTop = by + 'px'
    browREl.style.marginTop = by + 'px'
    // Sterling stern brows
    if (personaId === 'sterling') {
      browLEl.style.transform = `rotate(${st==='speaking'? 18+amp*5 : 18}deg)`
      browREl.style.transform = `rotate(${st==='speaking'?-(18+amp*5):-(18)}deg)`
    }
    avatarRaf = requestAnimationFrame(tick)
  }
  tick()
}

// ══════════════════════════════════════════════════════════════════════════════
// AUDIO CONTEXT
// ══════════════════════════════════════════════════════════════════════════════
function initAudioCtx() {
  if (audioSrcReady) return
  try {
    audioCtx  = new AudioContext()
    analyser  = audioCtx.createAnalyser()
    analyser.fftSize = 256
    const src = audioCtx.createMediaElementSource(ttsAudio)
    src.connect(analyser)
    analyser.connect(audioCtx.destination)
    audioSrcReady = true
  } catch(e) { console.warn('AudioCtx:', e) }
}

function startAmp() {
  if (!analyser) return
  const data = new Uint8Array(analyser.frequencyBinCount)
  function tick() { analyser.getByteFrequencyData(data); amplitude = data.reduce((a,b)=>a+b,0)/data.length/128; ampRaf = requestAnimationFrame(tick) }
  tick()
}
function stopAmp() { if (ampRaf) cancelAnimationFrame(ampRaf); ampRaf=null; amplitude=0 }

// ══════════════════════════════════════════════════════════════════════════════
// RECORDING
// ══════════════════════════════════════════════════════════════════════════════
async function startRec() {
  if (isProcessing || isSpeaking || isRecording || isGenReport) return
  if (!apiKey) { alert('Please save your OpenAI API key first.'); return }
  initAudioCtx()
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true })
    const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm'
    mediaRec = new MediaRecorder(stream, { mimeType: mime })
    audioChunks = []
    mediaRec.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data) }
    mediaRec.start(100)
    isRecording = true; updateUI()
  } catch { alert('Microphone access denied.') }
}

function stopRec() {
  if (!isRecording || !mediaRec) return
  isRecording = false
  mediaRec.onstop = async () => {
    const mime = mediaRec.mimeType
    const blob = new Blob(audioChunks, { type: mime })
    mediaRec.stream.getTracks().forEach(t => t.stop())
    mediaRec = null
    if (blob.size >= 1000) await pipeline(blob, mime)
    else updateUI()
  }
  mediaRec.stop(); updateUI()
}

micBtn.addEventListener('pointerdown', e => { e.currentTarget.setPointerCapture(e.pointerId); startRec() })
micBtn.addEventListener('pointerup',   stopRec)

// ══════════════════════════════════════════════════════════════════════════════
// PIPELINE: STT → LLM → TTS
// ══════════════════════════════════════════════════════════════════════════════
async function pipeline(blob, mime) {
  isProcessing = true; updateUI()
  const typingEl = appendTyping()
  try {
    // ── Whisper (verbose_json for pronunciation) ──
    const ext = mime.includes('mp4') ? 'm4a' : 'webm'
    const fd  = new FormData()
    fd.append('file', blob, `rec.${ext}`)
    fd.append('model', 'whisper-1')
    fd.append('response_format', 'verbose_json')
    fd.append('timestamp_granularities[]', 'segment')

    const sttRes = await fetch('https://api.openai.com/v1/audio/transcriptions', {
      method:'POST', headers:{ Authorization:`Bearer ${apiKey}` }, body:fd
    })
    if (!sttRes.ok) throw new Error(`Whisper ${sttRes.status}: ${await sttRes.text()}`)
    const sttData = await sttRes.json()
    const transcript = (sttData.text || '').trim()
    if (!transcript) throw new Error('Could not transcribe. Please speak more clearly.')

    // Pronunciation score (English only)
    let pronScore = null
    if (sttData.language === 'en' && sttData.segments && sttData.segments.length > 0) {
      const avg = sttData.segments.reduce((s,seg) => s + seg.avg_logprob, 0) / sttData.segments.length
      pronScore = Math.min(100, Math.max(0, Math.round((1 + avg) * 100)))
    }

    // ── GPT-4o ──
    const p   = PERSONAS[personaId]
    const topic = TOPICS.find(t => t.id === topicId)
    const sysPrompt = topic?.hint ? `${p.prompt}\n\nCurrent topic: ${topic.hint}` : p.prompt

    const msgs = [
      { role:'system', content: sysPrompt },
      ...history.slice(-20),
      { role:'user', content: transcript }
    ]
    const chatRes = await fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST',
      headers:{ Authorization:`Bearer ${apiKey}`, 'Content-Type':'application/json' },
      body: JSON.stringify({ model:'gpt-4o', response_format:{type:'json_object'}, temperature: personaId==='sterling'?.6:.8, max_tokens:400, messages:msgs })
    })
    if (!chatRes.ok) throw new Error(`GPT-4o ${chatRes.status}: ${await chatRes.text()}`)
    const cd = await chatRes.json()
    const parsed = JSON.parse(cd.choices[0].message.content)
    const correction = parsed.correction ?? null
    const reply      = parsed.reply ?? "Sorry, I couldn't reply."

    // ── TTS ──
    const ttsRes = await fetch('https://api.openai.com/v1/audio/speech', {
      method:'POST',
      headers:{ Authorization:`Bearer ${apiKey}`, 'Content-Type':'application/json' },
      body: JSON.stringify({ model:'tts-1', voice: p.voice, input: reply, response_format:'mp3' })
    })
    if (!ttsRes.ok) throw new Error(`TTS ${ttsRes.status}: ${await ttsRes.text()}`)
    const audioUrl = URL.createObjectURL(new Blob([await ttsRes.arrayBuffer()], { type:'audio/mpeg' }))

    typingEl.remove()
    appendUser(transcript, correction, pronScore)
    appendAI(reply)
    history.push({ role:'user', content:transcript })
    history.push({ role:'assistant', content:reply })

    // Show report button after first user msg
    const userCount = history.filter(h=>h.role==='user').length
    if (userCount >= 1) reportBtn.style.display = 'flex'

    isProcessing = false; isSpeaking = true; updateUI()
    startAmp(); audioCtx?.resume()
    ttsAudio.src = audioUrl; ttsAudio.play()
    ttsAudio.onended = () => { stopAmp(); isSpeaking = false; URL.revokeObjectURL(audioUrl); updateUI() }
  } catch(err) {
    typingEl.remove()
    appendAI(`⚠️ ${err.message}`)
    isProcessing = false; updateUI()
  }
}

reportBtn.onclick = generateReport
async function generateReport() {
  const msgs = collectMessages()
  if (!msgs.length) return
  isGenReport = true; updateUI()
  try {
    const body = JSON.stringify({
      messages: msgs,
      personaId,
      topicId,
    })
    const res = await fetch('/api/report', {
      method:'POST', headers:{'Content-Type':'application/json'}, body
    })
    if (!res.ok) throw new Error(`Report API ${res.status}`)
    const report = await res.json()
    const userMsgs  = msgs.filter(m=>m.role==='user')
    const pronScores = userMsgs.map(m=>m.pronunciationScore).filter(s=>s!==null)
    const avgPron = pronScores.length ? Math.round(pronScores.reduce((a,b)=>a+b,0)/pronScores.length) : null
    showReportModal(report, userMsgs.length, avgPron)
    saveSessionLocal(report, avgPron)
  } catch(err) { alert(`리포트 생성 실패: ${err.message}`) }
  finally { isGenReport = false; updateUI() }
}

function collectMessages() {
  const els = chat.querySelectorAll('[data-msg]')
  const out = []
  els.forEach(el => {
    const role   = el.dataset.msg
    const text   = el.dataset.text
    const corr   = el.dataset.corr  || null
    const pron   = el.dataset.pron  !== undefined ? Number(el.dataset.pron) : null
    out.push({ role, text, correction: role==='user'?corr:null, pronunciationScore: role==='user'?pron:null })
  })
  return out
}

function loadSessions() { try { return JSON.parse(localStorage.getItem('speakai_sessions')||'[]') } catch { return [] } }
function saveSessions(s) { try { localStorage.setItem('speakai_sessions', JSON.stringify(s.slice(0,30))) } catch {} }

function saveSessionLocal(report, avgPron) {
  const msgs = collectMessages()
  const stored = {
    id: sessionId, personaId, topicId,
    startedAt: sessionStart, endedAt: new Date().toISOString(),
    messageCount: msgs.filter(m=>m.role==='user').length,
    messages: msgs.map(m=>({...m, timestamp: new Date().toISOString()})),
    avgPronunciationScore: avgPron, report
  }
  const sessions = loadSessions()
  saveSessions([stored, ...sessions.filter(s=>s.id!==sessionId)])
  updateHistBadge()
}

function updateHistBadge() {
  const n = loadSessions().length
  badge.style.display = n > 0 ? 'inline-flex' : 'none'
  badge.textContent   = n > 9 ? '9+' : n
}

        ).join('')
        return `<div class="hist-item" id="hi-${s.id}">

                ${sc!=null?`<span class="score-chip" style="color:${scColor};border-color:${scBdr}">${sc}점</span>`:''}
              </div>
              <div class="hist-sub">${fmtDate(s.startedAt)} · ${s.messageCount}개</div>
            </div>
            <span style="color:var(--mut);font-size:12px">▾</span>
          </div>
          <div class="hist-detail" id="hd-${s.id}">
            <div class="hist-msgs">${msgsHtml}</div>
            ${s.report?.overallFeedback?`<div class="hist-fbk">${esc(s.report.overallFeedback)}</div>`:''}
            ${(s.report?.recommendations||[]).slice(0,2).map(r=>`<div style="font-size:11px;color:#38bdf8;margin-bottom:4px">→ ${esc(r)}</div>`).join('')}
            <button class="hist-del" onclick="delSession('${s.id}', this)">🗑 삭제</button>
          </div>
        </div>`
      }).join('')
    : `<div class="empty-hist"><div>📭</div>저장된 대화가 없습니다.</div>`

  ov.innerHTML = `
  <div class="drawer-backdrop" onclick="this.parentElement.remove()"></div>
  <div class="drawer">
    <div class="drawer-hdr">
      <h2>🕐 대화 기록</h2>
      <button class="modal-close" onclick="this.closest('.drawer-overlay').remove()">✕</button>
    </div>
    <div class="drawer-body">${items}</div>
  </div>`
  document.body.appendChild(ov)
}

function toggleHist(id) {
  const d = document.getElementById('hd-'+id)
  if (d) d.classList.toggle('open')
}
function delSession(id, btn) {
  const sessions = loadSessions().filter(s=>s.id!==id)
  saveSessions(sessions)
  updateHistBadge()
  btn.closest('.hist-item').remove()
}

// ══════════════════════════════════════════════════════════════════════════════
// SESSION RESET
// ══════════════════════════════════════════════════════════════════════════════
resetBtn.onclick = resetSession
function resetSession() {
  stopAmp(); isSpeaking = false
  ttsAudio.pause(); ttsAudio.src = ''
  history = []; sessionId = uid(); sessionStart = new Date().toISOString()
  chat.innerHTML = ''
  reportBtn.style.display = 'none'
  appendAI(PERSONAS[personaId].greeting)
  updateUI()
}

// ══════════════════════════════════════════════════════════════════════════════
// KEY SAVE
// ══════════════════════════════════════════════════════════════════════════════
keySave.onclick = () => {
  const v = keyInput.value.trim()
  if (!v) { alert('Please enter your OpenAI API key.'); return }
  apiKey = v; localStorage.setItem('oai_key', v)
  keySave.textContent = 'Saved ✓'
  setTimeout(() => keySave.textContent = 'Save', 1500)
}

// ══════════════════════════════════════════════════════════════════════════════
// UI STATE
// ══════════════════════════════════════════════════════════════════════════════
function charState() { return isSpeaking?'speaking':isProcessing||isGenReport?'thinking':isRecording?'listening':'idle' }

function updateUI() {
  const st  = charState()
  const dis = isProcessing || isSpeaking || isGenReport
  micBtn.disabled = dis
  micBtn.classList.toggle('rec', isRecording)
  icMic.style.display  = (!isRecording && !dis) ? '' : 'none'
  icOff.style.display  = isRecording ? '' : 'none'
  icSpin.style.display = dis ? '' : 'none'

  statusTxt.textContent =
    isRecording  ? 'Release to send'        :
    isGenReport  ? '리포트 생성 중…'         :
    isProcessing ? 'Processing…'             :
    isSpeaking   ? `${PERSONAS[personaId].name} is speaking…` :
                   'Hold to speak · 한국어도 OK'

  const badge = {
    speaking:  { bg:'rgba(99,102,241,.8)',  color:'#fff',       label:'Speaking'  },
    listening: { bg:'rgba(239,68,68,.8)',   color:'#fff',       label:'Listening' },
    thinking:  { bg:'rgba(217,119,6,.8)',   color:'#fff',       label:'Thinking…' },
    idle:      { bg:'rgba(51,65,85,.6)',    color:'#94a3b8',    label:'Idle'      },
  }[st]
  stateBadge.style.background = badge.bg
  stateBadge.style.color      = badge.color
  stateBadge.textContent      = badge.label

  if (isGenReport) {
    reportBtn.textContent = '분석 중…'
    reportBtn.disabled = true
  } else {
    reportBtn.innerHTML = `<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg> 리포트`
    reportBtn.disabled = false
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// DOM HELPERS
// ══════════════════════════════════════════════════════════════════════════════
function pronClass(s) { return s>=80?'pron-ex':s>=60?'pron-gd':s>=40?'pron-ok':'pron-nw' }
function pronLabel(s) { return s>=80?'Excellent':s>=60?'Good':s>=40?'Fair':'Needs work' }

function appendUser(text, correction, pronScore) {
  const w = document.createElement('div')
  w.className = 'mw user'
  w.innerHTML = `<div class="bub" data-msg="user" data-text="${esc2(text)}" data-corr="${esc2(correction||'')}" ${pronScore!==null?`data-pron="${pronScore}"`:''}>${esc(text)}</div>`
  if (pronScore !== null) {
    const pb = document.createElement('span')
    pb.className = `pron-badge ${pronClass(pronScore)}`
    pb.textContent = `🎙 ${pronScore}% · ${pronLabel(pronScore)}`
    w.appendChild(pb)
  }
  if (correction) {
    const c = document.createElement('div')
    c.className = 'correction'
    c.innerHTML = `<strong>💡 More natural: </strong>${esc(correction)}`
    w.appendChild(c)
  }
  chat.appendChild(w); scrollChat()
}

function appendAI(text) {
  const w = document.createElement('div')
  w.className = 'mw ai'
  w.innerHTML = `<div class="ai-row"><div class="ai-av">${PERSONAS[personaId].emoji}</div><div class="bub" data-msg="assistant" data-text="${esc2(text)}">${esc(text)}</div></div>`
  chat.appendChild(w); scrollChat()
}

function appendTyping() {
  const w = document.createElement('div')
  w.className = 'mw ai'
  w.innerHTML = `<div class="ai-row"><div class="ai-av">${PERSONAS[personaId].emoji}</div><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`
  chat.appendChild(w); scrollChat(); return w
}

function scrollChat() { chat.scrollTop = chat.scrollHeight }
function esc(s='') { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function esc2(s='') { return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;') }
function uid() { return Date.now()+'-'+Math.random().toString(36).slice(2,8) }
function fmtDate(iso) {
  const d = new Date(iso)
  return d.toLocaleDateString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})
}
</script>
