<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Tutor AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --indigo: #6366f1;
      --indigo-hover: #818cf8;
      --red: #ef4444;
      --amber-bg: rgba(245,158,11,0.12);
      --amber-border: rgba(245,158,11,0.3);
      --amber-text: #fcd34d;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

    #app { display: flex; flex-direction: column; height: 100%; max-width: 680px; margin: 0 auto; }

    /* API Key banner */
    #key-banner {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; background: var(--surface);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    #key-banner label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
    #key-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 10px; color: var(--text); font-size: 12px;
      outline: none; font-family: monospace;
    }
    #key-input:focus { border-color: var(--indigo); }
    #key-save {
      padding: 5px 12px; background: var(--indigo); color: #fff;
      border: none; border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap;
    }
    #key-save:hover { background: var(--indigo-hover); }

    /* Header */
    header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      background: rgba(15,23,42,0.92); backdrop-filter: blur(8px);
      position: sticky; top: 0; z-index: 10; flex-shrink: 0;
    }
    .header-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--indigo); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .header-icon svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    header h1 { font-size: 15px; font-weight: 600; line-height: 1.2; }
    header p  { font-size: 11px; color: var(--text-muted); }

    /* Chat */
    #chat { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }

    .msg-wrap { display: flex; flex-direction: column; }
    .msg-wrap.user  { align-items: flex-end; }
    .msg-wrap.ai    { align-items: flex-start; }

    .bubble {
      max-width: 80%; padding: 10px 14px; border-radius: 16px;
      font-size: 14px; line-height: 1.55;
    }
    .user .bubble  { background: var(--indigo); color: #fff; border-bottom-right-radius: 4px; }
    .ai  .bubble   { background: var(--surface); color: var(--text); border-top-left-radius: 4px; }

    .ai-row { display: flex; align-items: flex-start; gap: 10px; }
    .ai-avatar {
      width: 28px; height: 28px; border-radius: 50%; background: var(--surface2);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px;
    }
    .ai-avatar svg { width: 13px; height: 13px; stroke: var(--indigo-hover); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .correction {
      margin-top: 6px; max-width: 80%;
      padding: 8px 12px; border-radius: 10px;
      background: var(--amber-bg); border: 1px solid var(--amber-border);
      font-size: 12px; line-height: 1.5; color: var(--amber-text);
    }
    .correction strong { font-weight: 600; }

    /* Typing indicator */
    .typing { display: flex; align-items: flex-start; gap: 10px; }
    .dots { display: flex; align-items: center; gap: 4px; padding: 12px 14px; background: var(--surface); border-radius: 16px; border-top-left-radius: 4px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); animation: bounce 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* Footer */
    footer {
      padding: 16px; border-top: 1px solid var(--border);
      background: rgba(15,23,42,0.92); backdrop-filter: blur(8px);
      display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0;
    }
    #status-text { font-size: 12px; color: var(--text-muted); }

    /* Mic button */
    #mic-btn {
      width: 64px; height: 64px; border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      position: relative; user-select: none; -webkit-user-select: none;
      background: var(--indigo); box-shadow: 0 4px 20px rgba(99,102,241,0.4);
    }
    #mic-btn svg { width: 26px; height: 26px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; pointer-events: none; }
    #mic-btn:disabled { background: var(--surface2); box-shadow: none; cursor: not-allowed; opacity: 0.5; }
    #mic-btn.recording { background: var(--red); transform: scale(1.1); box-shadow: 0 4px 24px rgba(239,68,68,0.5); }
    #mic-btn.recording::before {
      content: ""; position: absolute; inset: -10px; border-radius: 50%;
      border: 2px solid var(--red); animation: pulse-ring 1.2s ease-out infinite;
    }
    @keyframes pulse-ring { 0%{transform:scale(1);opacity:.9} 100%{transform:scale(1.6);opacity:0} }
    #mic-btn:not(.recording):not(:disabled):active { transform: scale(0.94); }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="app">
  <div id="key-banner">
    <label for="key-input">OpenAI API Key</label>
    <input id="key-input" type="password" placeholder="sk-..." autocomplete="off" />
    <button id="key-save">Save</button>
  </div>

  <header>
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    </div>
    <div>
      <h1>English Tutor AI</h1>
      <p>Talk about anything · 한국어도 OK · GPT-4o + Whisper + TTS</p>
    </div>
  </header>

  <div id="chat"></div>

  <footer>
    <span id="status-text">Hold to speak · 한국어도 OK</span>
    <button id="mic-btn" aria-label="Hold to speak">
      <svg id="icon-mic" viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M19 10a7 7 0 0 1-14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
      <svg id="icon-micoff" viewBox="0 0 24 24" style="display:none"><line x1="2" y1="2" x2="22" y2="22"/><path d="M18.89 13.23A7.12 7.12 0 0 0 19 12"/><path d="M5 10a7 7 0 0 0 12.93 3"/><path d="M15 9.34V5a3 3 0 0 0-5.68-1.33"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
      <svg id="icon-spin" viewBox="0 0 24 24" class="spin" style="display:none"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
    </button>
  </footer>
</div>

<audio id="tts-audio" style="display:none"></audio>

<script>
(function () {
  const SYSTEM_PROMPT = `You are Kai, a warm and encouraging AI conversation partner helping Korean speakers improve their English through natural, flowing dialogue.

**Language Policy:**
- Always respond primarily in English to maximize the user's exposure to the language.
- If the user speaks Korean, briefly acknowledge in Korean (one short sentence), then gently invite them to try saying it in English, and continue the conversation in English.
- Never refuse to engage — always keep the conversation going regardless of what language they use.

**Grammar Correction:**
- If the user speaks English and makes grammatical errors or uses unnatural phrasing, set "correction" to a natural, encouraging alternative with a very brief note on why.
- If their English is perfect, or if they spoke Korean, set "correction" to null.
- Never be harsh — frame corrections as "A more natural way to say that would be…"

**Conversation Style:**
- Be warm, curious, and engaging — like a native English-speaking friend who genuinely enjoys talking.
- Ask one open-ended follow-up question at the end of each reply to keep the conversation flowing.
- Cover a wide range of everyday topics naturally: travel, food, movies, music, hobbies, work, culture, technology, etc.
- Keep replies concise (2–3 sentences + one question). Don't lecture.
- Occasionally weave in natural idioms or expressions, and subtly explain them if they seem unfamiliar.

**Response format — always return valid JSON with exactly these two keys:**
{
  "correction": "Natural, encouraging correction if the user made English errors — otherwise null",
  "reply": "Your conversational English response (brief Korean support only when essential)"
}`;

  let apiKey = localStorage.getItem("oai_key") || "";
  let isRecording = false;
  let isProcessing = false;
  let mediaRecorder = null;
  let audioChunks = [];
  // Conversation history for GPT-4o context
  let history = [];

  const chat       = document.getElementById("chat");
  const micBtn     = document.getElementById("mic-btn");
  const statusText = document.getElementById("status-text");
  const keyInput   = document.getElementById("key-input");
  const keySave    = document.getElementById("key-save");
  const ttsAudio   = document.getElementById("tts-audio");
  const iconMic    = document.getElementById("icon-mic");
  const iconMicOff = document.getElementById("icon-micoff");
  const iconSpin   = document.getElementById("icon-spin");

  if (apiKey) keyInput.value = apiKey;
  appendAI("Hey! I'm Kai, your English conversation partner. Hold the mic and start talking — any topic, any time. 😊 What's been on your mind lately?");

  keySave.addEventListener("click", () => {
    const val = keyInput.value.trim();
    if (!val) { alert("Please enter your OpenAI API key."); return; }
    apiKey = val;
    localStorage.setItem("oai_key", val);
    keySave.textContent = "Saved ✓";
    setTimeout(() => (keySave.textContent = "Save"), 1500);
  });

  micBtn.addEventListener("pointerdown", (e) => {
    e.currentTarget.setPointerCapture(e.pointerId);
    startRecording();
  });
  micBtn.addEventListener("pointerup", stopRecording);
  micBtn.addEventListener("pointerleave", stopRecording);

  async function startRecording() {
    if (isProcessing || isRecording) return;
    if (!apiKey) { alert("Please save your OpenAI API key first."); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
        ? "audio/webm;codecs=opus" : "audio/webm";
      mediaRecorder = new MediaRecorder(stream, { mimeType });
      audioChunks = [];
      mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.start(100);
      isRecording = true;
      setUI("recording");
    } catch {
      alert("Microphone access denied. Please allow microphone access and try again.");
    }
  }

  function stopRecording() {
    if (!isRecording || !mediaRecorder) return;
    isRecording = false;
    mediaRecorder.onstop = async () => {
      const mimeType = mediaRecorder.mimeType;
      const blob = new Blob(audioChunks, { type: mimeType });
      mediaRecorder.stream.getTracks().forEach((t) => t.stop());
      mediaRecorder = null;
      if (blob.size < 1000) { setUI("idle"); return; }
      await pipeline(blob, mimeType);
    };
    mediaRecorder.stop();
  }

  async function pipeline(audioBlob, mimeType) {
    setUI("processing");
    const typingEl = appendTyping();
    try {
      /* Step 1 – Whisper STT (no forced language → Korean OK too) */
      const ext = mimeType.includes("mp4") ? "m4a" : "webm";
      const formData = new FormData();
      formData.append("file", audioBlob, `recording.${ext}`);
      formData.append("model", "whisper-1");

      const sttRes = await fetch("https://api.openai.com/v1/audio/transcriptions", {
        method: "POST",
        headers: { Authorization: `Bearer ${apiKey}` },
        body: formData,
      });
      if (!sttRes.ok) throw new Error(`Whisper error ${sttRes.status}: ${await sttRes.text()}`);
      const { text: transcript } = await sttRes.json();
      if (!transcript || !transcript.trim()) throw new Error("Could not transcribe audio. Please speak more clearly.");

      /* Step 2 – GPT-4o with full history */
      const messages = [
        { role: "system", content: SYSTEM_PROMPT },
        // Cap at last 20 turns to stay within token budget
        ...history.slice(-20),
        { role: "user", content: transcript },
      ];

      const chatRes = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: { Authorization: `Bearer ${apiKey}`, "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "gpt-4o",
          response_format: { type: "json_object" },
          temperature: 0.8,
          max_tokens: 400,
          messages,
        }),
      });
      if (!chatRes.ok) throw new Error(`GPT-4o error ${chatRes.status}: ${await chatRes.text()}`);
      const chatData = await chatRes.json();
      const parsed = JSON.parse(chatData.choices[0].message.content);
      const correction = parsed.correction ?? null;
      const reply = parsed.reply ?? "Sorry, I couldn't generate a reply.";

      /* Step 3 – TTS */
      const ttsRes = await fetch("https://api.openai.com/v1/audio/speech", {
        method: "POST",
        headers: { Authorization: `Bearer ${apiKey}`, "Content-Type": "application/json" },
        body: JSON.stringify({ model: "tts-1", voice: "alloy", input: reply, response_format: "mp3" }),
      });
      if (!ttsRes.ok) throw new Error(`TTS error ${ttsRes.status}: ${await ttsRes.text()}`);
      const audioBuffer = await ttsRes.arrayBuffer();
      const audioUrl = URL.createObjectURL(new Blob([audioBuffer], { type: "audio/mpeg" }));

      /* Render */
      typingEl.remove();
      appendUser(transcript, correction);
      appendAI(reply);

      /* Update history */
      history.push({ role: "user", content: transcript });
      history.push({ role: "assistant", content: reply });

      /* Auto-play */
      ttsAudio.src = audioUrl;
      ttsAudio.play();
      ttsAudio.onended = () => URL.revokeObjectURL(audioUrl);

    } catch (err) {
      typingEl.remove();
      appendAI(`⚠️ ${err.message}`);
    } finally {
      setUI("idle");
    }
  }

  function setUI(state) {
    isProcessing = state === "processing";
    isRecording  = state === "recording";
    micBtn.disabled = isProcessing;
    micBtn.classList.toggle("recording", state === "recording");
    iconMic.style.display    = state === "idle"       ? "" : "none";
    iconMicOff.style.display = state === "recording"  ? "" : "none";
    iconSpin.style.display   = state === "processing" ? "" : "none";
    statusText.textContent =
      state === "recording"  ? "Release to send"         :
      state === "processing" ? "Processing…"              :
                               "Hold to speak · 한국어도 OK";
  }

  function appendUser(text, correction) {
    const wrap = document.createElement("div");
    wrap.className = "msg-wrap user";
    wrap.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
    if (correction) {
      const c = document.createElement("div");
      c.className = "correction";
      c.innerHTML = `<strong>💡 More natural: </strong>${escHtml(correction)}`;
      wrap.appendChild(c);
    }
    chat.appendChild(wrap);
    scrollBottom();
  }

  function appendAI(text) {
    const wrap = document.createElement("div");
    wrap.className = "msg-wrap ai";
    wrap.innerHTML = `
      <div class="ai-row">
        <div class="ai-avatar">
          <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </div>
        <div class="bubble">${escHtml(text)}</div>
      </div>`;
    chat.appendChild(wrap);
    scrollBottom();
  }

  function appendTyping() {
    const wrap = document.createElement("div");
    wrap.className = "msg-wrap ai";
    wrap.innerHTML = `
      <div class="typing">
        <div class="ai-avatar">
          <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </div>
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      </div>`;
    chat.appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  function scrollBottom() { chat.scrollTop = chat.scrollHeight; }

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
})();
</script>
</body>
</html>
